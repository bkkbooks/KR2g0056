body:
  text: 入蜀記卷二宋陸遊撰十五日早州學教授左文林郎吳博古敏叔員外教授左文林郎楊恂信伯來飯已遊黃山東嶽廟廣福寺遂登凌歊臺嶽廟棟宇頗盛本謂之黃山大監廟大監者不知何神蓋淫祠也今既為嶽廟而大監反寓食廡下廣福本夀聖寺以紹興壬午詔書改額敗屋二十餘間殘僧三四人蕭然如古驛主僧慧明溫州平陽人凌歊臺正如鳳凰雨花之類特因山顛名之宋高祖所營面勢虛曠高出氛埃之表南望青山龍山九井諸峯如在几席龍山即孟嘉登高落帽處九井山有桓元僭位壇稍西江中二小山相對云東梁西梁也北戶臨和州新城樓櫓厯厯可辨蓋自絶江至和州才十餘里李太白有黃山凌歊臺送族弟泛舟赴華隂詩即此地也臺後有一塔塔之後又有亭曰懷古云余初至當塗飲姑熟溪水喜其甘滑已而遍飲城中水皆甘蓋泉脈佳也十六日郡集於道院厯遊城上亭榭有坐嘯亭頗宜登覽城濠皆植荷花是夜月白如晝影入溪中搖蕩如玉塔始知東坡玉塔卧微瀾之句為妙也十七日郡集於青山李太白祠堂二教授同集祠在青山之西北距山尚十五里墓在祠後有小岡阜起伏蓋亦青山之别支也祠莫知其始有唐劉全白所作墓碣及近嵗張真甫舍人所作重修祠碑太白烏巾白衣錦袍又有道帽氅裘侑食於側者郭功甫也早飯罷遊青山山南小市有謝玄暉故宅基今為湯氏所居南望平野極目而環宅皆流泉奇石青林文篠真佳處也遂由宅後登山路極險巇凡三四里有兩道人持湯飯迎勞於松石間又里許至一菴老道人出迎年七十餘姓周濰州人居此山三十年顴頰如丹鬚鬢無白者又有李媪八十矣耳目聰明談笑不衰自言嘗得異人祕訣菴前有小池曰謝公池水味甘冷雖盛夏不竭絶頂又有小亭亦名謝公亭下視四山如蛟龍奔放爭赴川谷絶類吾鄉舜山但舜山之巔豐沃夷曠無異平陸此所不及也亭北望正對厯陽周生言元顔亮入寇時戰鼓之聲震於山中云夜歸舟次已一鼓盡矣坐間信伯言桓溫墓亦在近郊有石獸石馬製作精妙又有碑悉刻當時車馬衣冠之類極可觀恨不一到也十八日小雨解舟出姑熟溪行江中江溪相接水清濁各不相亂挽行夾中三十里至大信口泊舟蓋自此出大江須風便乃可行往往連日阻風兩小山夾江即東梁西梁一名天門山李太白詩云兩岸青山相對出孤帆一片日邉來王文公詩云崔嵬天門山江水繞其下梅聖俞云東梁如仰蠶西梁如浮魚徐師川云南人北人朝暮船東梁西梁古今山皆得句於此也水滸小兒賣菱芡蓮藕者甚衆夜行堤上觀月大信口歐陽文忠公于役志謂之帶星口未詳孰是于役志蓋謫夷陵時所著也十九日便風過大小褐山磯奇石巉絶漁人依石挽罾宛如畫圖間所見過梟磯在大江中聳拔特起有道士結廬其上政和中賜名寧淵觀舊説梟磯有梟能害人故得名方郡縣奏乞觀額時惡其名因曰磯在水中水常沃石故曰澆磯今觀屋亦二十餘間然止一道人居之相傳有二人則其一輒死故無敢往者至蕪湖縣泊舟吳波亭知縣右通直郎呂昭問來按漢丹陽郡有蕪湖縣吳陸遜屯蕪湖又杜預注春秋楚子伐吳克鳩兹亦云在蕪湖至東晉乃改名于湖不知所自王敦反屯于湖今故城尚存又有玩鞭亭亦當時遺迹唐溫飛卿有湖隂曲敘其事近時張文潛以為晉書所云帝至于湖隂察營壘當以于湖為句飛卿蓋誤讀也作于湖曲以反之劉夢得厯陽書事詩敘道中事云望夫人化石夢帝日環營蓋夢得自夔州移牧厯陽過此邑也邑人云數年前邑境有盜發大墓棺槨已壞得鏡及刀劍之屬甚衆甃磚有大將軍墓四字或疑為敦墓云二十日寧國太平縣主簿左迪功郎陳炳來見泛小舟往謝之則寓寧淵觀下院以提刑司檄來督大禮錢帛寧淵在梟磯隔大江故置下院於近邑道流十餘壇宇像設甚盛有觀主何守誠者今選居太一宫矣炳字德先婺州義烏人自言其從姑得道徽宗朝賜號妙靜鍊師結廬葛仙峯下平生不火食惟飲酒啖生果為人言禍福死生無毫釐差每風日清和時輒掩關獨處或於戶外竊聽之但聞若二嬰兒聲或歌或笑往往至中夜方止莫有能測者年九十正旦自言四月八日當遠行果以是日坐逝每為德先言汝有仙骨當遇異人後因得疾委頓有皖山徐先生來餌以藥即日疾平徐因留教以絶粒訣德先父母方望其成名固不許然自是絶滋味日食淡湯餅及飯而已如此者六年益覺身輕能日行二百里會中第娶妻復近葷血徐遂告别臨行語德先曰汝二紀後當復從我究此事德先送至溪上方呼舟欲渡徐褰裳疾行水上而去呼之不復應德先至今悵恨有棄官入灊皖之意豫遂遊東寺登王敦城以歸城並大江氣象宏敞邑出緑毛龜就船賣者不可勝數將午解舟過三山磯磯上新作龍祠有道人半醉立蘚崖峭絶處下觀行舟望之使人寒心亦奇士也江中江豚十數出沒色或黑或黃俄又有物長數尺色正赤類大蜈蚣奮首逆水而上激水高三二尺殊可畏也宿過道口二十一日過繁昌縣南唐所置初𨽻宣城及置太平州復割𨽻焉晚泊荻港散步堤上遊龍廟有老道人守之台州仙居縣人自言居此十年日伐薪二束賣之以自給雨雪則從人乞未嘗他營也又至一菴僧言隔港即銅陵界遠山嶄然臨大江者即銅官山太白所謂我愛銅官樂千年未擬還是也恨不一到最後至鳳凰山延禧觀觀廢於兵燼者四十餘年近方興葺羽流五六人觀主陳廷瑞婺州義烏縣人言此古青華觀也有趙先生荻港市中人父賣茗先生幼名王九年十三疾亟父抱詣青華願使入道是夕先生夢老人引之登高山謂曰我隂翁也出柏枝啖之及覺遂不火食後又夢前老人教以天篆數百字比覺悉記不遺太宗皇帝召見度為道士賜冠簡易名自然給裝錢遣還遂為觀主祥符間再召至京師賜紫衣改青華額曰延禧先生懇求還山養母得歸一日無疾而逝門人葬之山中行半途棺忽大重不可舉其母曰吾兒必有異命發棺果空無尸惟劒履在耳遂即其處葬之今冢猶在謂之劔冢自然國史有傳大槩與廷瑞言頗合惟劔冢一事無之荻港蓋繁昌小墟市也歸舟已夜矣二十二日過大江入丁家洲夾復行大江自離當塗風日清美波平如席白雲青嶂逺相映帶終日如行圖畫殊忘道途之勞也過銅陵縣不入晚泊水洪口江湖間謂分流處為洪王文公詩云東江木落水分洪是也二十三日過陽山磯始見九華山九華本名九子李太白為易名太白與劉夢得皆有詩而劉至以為可兼太華女几之奇秀南唐宋子嵩辭政柄歸隱此山號九華先生封青陽公由是九華之名益盛惟王文公詩云盤根雖巨壯其末乃修纖最極形容之妙大抵此山之奇在修纎耳然無含蓄敦大氣象與廬山天台異矣岸旁荻花如雪舊見天井長老彥威云廬山老僧用此絮裝衣威少時在惠日亦為之佛燈珣禪師見而大嗔云汝少年輒求溫暖如此豈有心學道耶退而問兄弟則堂中百人有荻花衣者才三四皆年七十餘矣威愧恐亟除去泊梅根港巨魚十數色蒼白大如黃犢出沒水中每出水輒激起沸白成浪真壯觀也二十四日到池州泊稅務亭子州唐置南唐嘗為康化軍節度今省又嘗割青陽𨽻建康今復故惟所置銅陵東流二縣及改秋浦為貴池今因之蓋南唐都金陵故當塗蕪湖銅陵繁昌廣德青陽并江寧上元溧陽溧水句容凡十一縣皆𨽻畿內今建康為行都而才有江寧等五邑有司所當議也李太白往來江東此州所賦尤多如秋浦歌十七首及九華山清溪白笴陂玉鏡潭諸詩是也秋浦歌云秋浦長似秋蕭條使人愁又曰兩鬢入秋浦一朝颯已衰猿聲催白鬢長短盡成絲則池州之風物可見矣然觀太白此歌高妙乃爾則知姑熟十詠決為贋作也杜牧之池州諸詩正爾觀之亦清婉可愛若與太白詩並讀醇醨異味矣初王師平南唐命曹彬分兵自荆州順流東下以樊若冰為鄉導首克池州然後能取蕪湖當塗駐軍采石而浮橋成則池州今實要地不可不備也二十五日見知州右朝議大夫直祕閣楊師中通判右朝奉郎孫德芻遊光孝寺寺有西峯聖者所留鐵笛聖者生當吳武王楊行密時陽狂不羈好吹笛能役鬼神蛟龍嘗寓池州乾明寺乾明即光孝也及去留笛付主事僧笛似銅鐵而非色緑而瑩潤如緑玊不知何物僧懼為好事者所奪郡官求觀之輒出一凡鐵笛充數豫偶與監寺僧有舊獨得一見有石刻沈睿達所作西峯銘文辭古雅可愛恨非其自書也僧言貴池去城八十里在秀山下江之一支别匯為池四隅皆因山石為岸産鯉魚金鱗朱尾味極美本以此得貴池之目秀山有梁昭明太子墓拱木森然今池州城西有神甚靈者曰九郎或云九郎即昭明晚登弄水亭杜牧之所賦詩也亭殊不葺然正對清溪齊山景物絶佳州雖瀕江然據岡阜上頗難得水二十六日解舟過長風沙羅剎石李太白江上贈竇長史詩云萬里南遷夜郎國三年歸及長風沙梅聖俞送方進士遊廬山云長風沙浪屋許大羅剎石齒水下排厯此二險過湓浦始見瀑布懸蒼崖即此地也又太白長干行云早晚下三巴預將書報家相迎不道逺直到長風沙蓋自金陵至此七百里而室家來迎其夫甚言其遠也地屬舒州舊最號湍險仁廟時發運使周湛役三十萬夫疏支流十里以避之至今為行舟之利羅剎石在大江中正如京口鶻峯而稍大白石拱起其上叢篠喬木亦有小神祠幡竿不知何神也西望羣山靡迤巖嶂深秀宛如吾廬南望鏡中諸山為之纍欷宿懷家洑懷姓也吳有尚書郎懷敘見顧雍傳二十七日五鼓大風自東北來舟人不告乘便風解船過雁翅夾有稅場居民二百許家岸下泊船甚衆遂經皖口至趙屯未朝食已行百五十里而風益大乃泊夾中皖口即王師破江南大將朱令贇水軍處趙屯有戍兵亦小市聚也是日大風至暮不止登岸行至夾口觀江中驚濤駭浪雖錢塘八月之潮不過也有一舟掀簸浪中欲入夾者再三不可得幾覆溺矣號呼救久方能入北望望正見皖山太白江上望皖公山詩云巉絶稱人意巉絶二字不刋之妙也南唐元宗南遷豫章舟中望皖山愛之謂左右曰此青峭數峰何名答曰舒州皖山時方新失淮南伶人李家明侍側獻詩曰龍舟千里揚東風漢武潯陽事正同回首皖公山色好日斜不到夀杯中元宗為悲憤欷歔故王文公詩云南狩皖山非故地北師淮水失名王計其處當去此不遠也夜雨二十八日過東流縣不入自雷江口行大江江南羣山蒼翠萬疊如列屏障凡數十里不絶自金陵以西所未有也是日便風張帆舟行甚速然江面浩渺白浪如山所乘二千斛舟搖兀掀舞才如一葉過獅子磯一名佛指磯蘚壁百尺青林緑篠倒生壁上圖畫有所不及猶恨舟行北岸不得過其下旁有數磯亦奇峭然皆非獅子比也至馬當所謂下元水府山勢尤秀拔正面山腳直插大江廟依峭崖架空為閣登降者皆自閣西崖腹小石徑捫蘿側足而上宛若登梯飛甍曲檻丹碧縹眇江上神祠惟此最佳舟至石壁下忽晝晦風勢橫甚舟人大恐失色急下帆趨小港竭力牽挽僅能入港繫纜同泊者四五舟皆來助牽早間同行一舟亦蜀舟也忽有大魚正緑腹下赤如丹躍起柂旁高三尺許人皆異之是晚果折檣破帆幾不能全亦可怪也入夜風愈厲增十餘纜逮曉方少定二十九日阻風馬當港中風雨淒冷初御夾衣有小舟冒風濤來賣薪菜豨肉亦有賣野彘肉者云獵蘆場中所得飯已登南岸望馬當廟北風吹人徑甚至不能語既暮風少定然怒濤未息擊船終夜有聲八月一日過烽火磯南朝自武昌至京口列置烽燧此山當是其一也自舟中望山突兀而已及拋江過其下嵌巖竇穴怪奇萬狀色澤瑩潤亦與它石迥異又有一石不附山傑然特起高百餘尺丹藤翠蔓羅絡其上如寶裝屏風是日風靜舟行頗遲又秋深潦縮故得盡見老杜所謂幸有舟楫遲得盡所厯妙也過澎浪磯小孤山二山東西相望小孤屬舒州宿松縣有戍兵凡江中獨山如金山焦山落星之類皆名天下然峭拔秀麗皆不可與小孤比自數十里外望之碧峯巉然孤起上干雲霄已非他山可擬愈近愈秀冬夏晴雨姿態萬變信造化之尤物也但祠宇極於荒殘若稍飾以樓觀亭榭與江山相發揮自當高出金山之上矣廟在山之西麓額曰惠濟神曰安濟夫人紹興初張魏公自湖湘還嘗加營葺有碑載其事又有别祠在澎浪磯屬江州彭澤縣三面臨江倒影水中亦占一山之勝舟過磯雖無風亦浪湧蓋以此得名也昔人詩有舟中估客莫漫狂小姑前年嫁彭郎之句傳者因謂小孤廟有彭郎像澎浪廟有小姑像實不然也晚泊沙夾距小孤一里微雨復以小艇遊廟中南望彭澤都昌諸山煙雨空濛鷗鷺滅沒極登臨之勝徙倚久之而歸方立廟門有俊鶻搏水禽掠江東南去甚可壯也廟祝云山有栖鶻甚多二日早行未二十里忽風雲騰湧急繫纜俄復開霽遂行泛彭蠡口四望無際乃知太白開帆入天鏡之句為妙始見廬山及大孤大孤狀類西梁雖不可擬小孤之秀麗然小孤之旁頗有沙洲葭葦大孤則四際渺瀰皆大江望之如浮水面亦一奇也江自湖口分一支為南江蓋江西路也江水渾濁每汲用皆以杏仁澄之過夕乃可飲南江則極清徹合處如引繩不相亂晚抵江州州治德化縣即唐之潯陽縣柴桑栗里皆其地也南唐為奉化軍節度今為定江軍岸土赤而壁立東坡先生所謂舟人指點岸如赬者也泊湓浦水亦甚清不與江水亂自七月二十六日至是首尾才六日其間一日阻風不行實以四日半泝流行七百里云三日移泊琵琶亭見知州左朝請郎周忭強仲通判左朝散郎胡適發運使戶部侍郎史正志志道發運司幹辦公事程坦履道察推左文林郎蔡戡定夫始得夔州公移四日遊天慶觀李太白詩所謂潯陽紫極宫也蘇黃詩刻皆不復存太白詩有一石亦近時俗書見觀主李守智問玉芝亦不能答觀皆古屋初不更兵燼而遺迹掃地獨太清殿老君像乃唐人所塑特為奇古真人女真仙官力士童子各二軀又有唐明皇帝金銅像衣冠如道士而氣宇粹穆有五十年安享太平富貴氣象李守智者滁州來安人自言家故富饒遇亂棄家為道人大將嶽飛以度牒與之始為道士至今畫嶽氏父子事之史志道招飲於發運廨中登高遠亭望廬山天氣澄霽諸峯盡見志道出新鼓鑄鐵錢五日郡集於庾樓樓正對廬山之雙劔峯北臨大江氣象雄麗自京口以西登覽之地多矣無出庾樓右者樓不甚高而覺江山煙雲皆在几席間真絶景也庾亮嘗為江荆豫州刺史其實則治武昌若武昌南樓名庾樓猶有理今江州治所在晉特柴桑縣之湓口關耳此樓附會甚明然白樂天詩固已云潯陽欲到思無窮庾亮樓南湓口東則承誤亦久矣張藝叟南遷録云庾亮鎮潯陽經始此樓其誤尤甚六日甲夜有大燈毬數百自湓浦蔽江而下至江面廣處分散漸逺赫然如繁星麗天土人云此乃一家放五百碗以禳災祈福蓋江鄉舊俗云七日往廬山小憩新橋市蓋吳蜀大路市肆壁間多蜀人題名並溪喬木往往皆三二百年物蓋山之麓也自江州至太平興國宫三十里此適當其半是日車馬及徒行者憧憧不絶云上觀蓋往太平宫焚香自八月一日至七日乃已謂之白蓮會蓮社本逺法師遺迹舊傳遠公嘗以一日借道流故至今太平宫嵗以為常東林寺亦自作會然來者反不若太平之盛亦可笑也晚至清虛菴菴在撥雲峯下皇甫道人所居皇甫名坦嘉州人出遊旁郡獨見其弟子曹彌深登紹興煥文閣實藏光堯皇帝御書又有神泉清虛堂皆宸翰題榜宿清虛西室曹君置酒堂中炙鹿肉甚珍酒尤清醇夜寒可附火八日早由山路至太平興國宫門庭氣象極閎壯正殿為九天采訪使者像衮冕如帝者舒州灊山靈仙觀祀九天司命真君而採訪使者為之佐故南唐名靈仙曰丹霞府太平曰通元府崇奉有自來矣至太宗皇帝時嘗遣中使送泥金絳羅雲鶴帔仍命三年一易神宗皇帝時又加封應元保運真君及賜塗金殿額兩壁圖十真人本吳生筆建炎中李成何世清二盜以廬山為巢宫屋焚蕩無餘先是山中有太一宫摹吳筆於殿廡及太平再興得摹取太一本所託非善工無復髣佛憩於雲無心堂蓋冷翠亭故趾也溪聲如大風雨至使人毛骨寒栗一宫之最勝處也采訪殿前有鐘樓高十許丈三層纍磚所成不用一木而櫩桷翬飛雖木工之良者不能加也但鐘為磚所掩蔽聲不甚揚亦是一病觀主胡思齊云此一樓為費三萬緡鐘重二萬四千餘斤又有經藏亦佳扁曰雲章瓊室太平規模大槩類南昌之玊隆然玊隆不經焚尚有古趣為勝也遂至東林太平興龍寺寺正對香爐峯峯分一支東行自北而西環合四抱有如城郭東林在其中相地者謂之倒挂龍格寺門外虎溪本小澗比年甃以磚但若一溝無復古趣豫勸其主僧法才去磚使少近自然不知能用吾言否食已煮觀音泉啜茶登華嚴羅漢閣閣與盧舍閣鐘樓鼎峙皆極天下之壯麗雖閩浙名藍所不能逮遂至上方五杉閣舍利塔白公草堂上方者自寺後支徑穿松隂躡石磴而上亦不甚高五杉閣前舊有老杉五本傳以為晉時物白傅所謂大十尺圍者今又數百年其老可知矣近嵗主僧了然輒伐去殊可惜也塔中作如來示寂像本宋佛駝跋陀尊者自西域持舍利五粒來葬於此草堂以白公記考之略是故處三間兩注亦如記所云其它如瀑水蓮池亦皆在高風逸韻尚可想見白公嘗以文集留草堂後屢亡逸真宗皇帝嘗令崇文院寫校包以斑竹帙送寺建炎中又壞於兵今獨有姑蘇版本一帙備故事耳草堂之旁又有一故址云是王子醇樞密菴基蓋東林為禪苑始於王公而照覺禪師常總實第一祖總公有塑像嚴重英特人也宿東林九日至晉慧遠法師祠堂及神運殿焚香憩官廳堂中有耶舍尊者劉遺民等十八人像謂之十八賢逺公之側又有一人執軍持侍立謂之辟蛇童子傳云東林故多蛇此童子盡拾取投之蘄州神運殿本龍潭深不可測一夕鬼神塞之且運良材以作此殿皆不知實否也然神運殿三字唐相裴休書則此説亦久矣官廳重堂邃廡厨廄備設壁間有張文潛題詩寺極大連日遊厯猶不能遍唐碑亦甚多惟顔魯公題名最為時所傳又有聰明泉在方丈之西卓錫泉在遠公祠堂後皆久廢不汲不可食為之太息食已遊西林乾明寺西林在東林之西二林之間有小市曰鴈門市傳者以為遠公鴈門人老而懷故鄉遂髣佛鴈門邑里作此市漢作新豐之比也西林本晉江州刺史陶範捨地建寺紹興十五六年間方為禪居褊小非東林比又絶敝壞主僧仁聰閩人方漸興葺然流泉泠泠環繞庭際殊有野趣正殿釋迦像著寶冠他處未見僧云唐塑也殿側有慧永法師祠堂永公蓋遠公之兄像下一虎偃伏又有一居士立侍不知何人方丈後有磚塔不甚髙制度古朴豫登二級而止東廂有小閣曰待賢蓋往時館客之地今亦頽敝東西林寺舊額皆牛奇章八分書筆力極渾厚西林亦有顔魯公題名書家以為二林題名顔書之冠冕也舊聞廬山天池磚塔初成有僧施經二匣未幾塔震一角經亦失所在是日因登望以問僧僧云誠然或謂經乃刺血書故致此異又云今年天池火尺椽不遺蓋旁野火所及也晚復取太平宫路還江州小憩於新亭距州二十五里過董真人煉丹井汲飲味亦佳董真人者奉也十日史志道餉谷簾水數器真絶品也甘腴清冷具備衆美前輩或斥水品以為不可信水品固不必盡當然谷簾卓然非惠山所及則亦不可誣也水在廬山景德觀晚别諸人連夕在山中極寒可擁爐比還舟秋暑殊未又終日揮扇十一日解舟吳發幹約待夔州書因小留江口望廬山自到江州至是凡十日皆晴秋髙氣清長空無纎雲甚宜登覽亦客中可喜事也泊赤沙湖口東北望猶見廬山老杜潭州道林詩云殿角插入赤沙湖此湖當在湖南然嶽州華容縣及此皆有赤沙湖蓋江湖間地名多同猶赤壁也十二日江中見物有雙角遠望正如小犢出沒水中有聲晚泊櫓臍洑隔江大山中有火兩點若鐙開闔久之問舟人皆不能知或云蛟龍之目或云靈芝丹藥光氣不可得而詳也十三日至富池昭勇廟以壺酒特豕謁昭毅武惠遺愛靈顯王神神吳大帝時折衝將軍甘興霸也興霸嘗為西陵太守故廟食於此開寶中既平江南增江淮神祠封爵始封褒國公宣和中進爵為王建炎中大盜張遇號一窩蜂擁兵過廟下相率卜珓一珓騰空中不下一珓躍出户外羣盜惶恐引去未幾遂敗大將劉光世以聞後詔加封嶽飛為宣撫使大葺祠宇江上神祠皆不及也門起大樓曰卷雪有釘洲正對廟故廟雖俯大江而可泊舟釘洲者以鋭下得名神妃封順祐夫人神二子封紹威紹靈侯神女封柔懿夫人皆有像而後殿復有王與妃像偶坐祭享之盛以夜繼日廟祝嵗輸官錢千二百緡則神之靈可知也舟人云若精虔致禱則神能分風以應往來之舟廡下有關雲長像雲長不應祀於興霸之廟者豈各忠所事神靈共食皆可以無愧耶徹奠自祠後步至旌教寺寺為酒務及酒官廨像設斂置一屋盡逐去僧輩亦事之已甚者富池蓋𨽻興國軍十四日曉雨過一小石山自頂直削去半與餘姚江濵之蜀山絶相類拋大江遇一木筏廣十餘丈長五十餘丈上有三四十家妻子雞犬臼碓皆具中為阡陌相往來亦有神祠素所未覩也舟人云此尚其小者耳大者於筏上鋪土作蔬圃或作酒肆皆不復能入夾但行大江而已是日逆風挽船自平旦至日昳才行十五六里泊劉官磯旁蘄州界也兒輩登岸歸云得小徑至山後有陂湖渺然蓮芰甚富沿湖多木芙蕖數家夕陽中蘆藩茅舍宛有幽致而寂然無人聲有大梨欲買之不可得湖中小艇采菱呼之亦不譍更欲窮之會見道旁設機疑有虎狼遂不敢往劉官磯者傳云漢昭烈入吳嘗檥舟於此晚觀大黿浮沈水中十五日微隂西風益徑挽船尤艱自富池以西沿江之南皆大山起伏如濤頭山麓時有居民往往作棚持弓矢伏其上以伺虎過龍眼磯江中拳石耳磯旁山上有龍祠晡後得便風次蘄口鎮居民繁錯蜀舟泊岸下甚衆監稅秉義郎高世棟來舊在京中識之言此鎮嵗課十五萬緡鴈翅嵗課二十六萬緡夜與諸子登岸臨大江觀月江面逺與天接月影入水蕩搖不定正如金虬動心駭目之觀也是日買熟藥於蘄口市藥貼中皆有煎煮所須如薄荷烏梅之類此等皆客中不可倉卒求者藥肆用心如此亦可嘉也入蜀記卷二
