body:
  text: 入蜀記傳記類四雜録之屬提要臣等謹案入蜀記四卷宋陸遊撰遊字務觀號放翁山隂人佃之孫宰之子初以蔭補登仕郎隆興初賜進士出身嘉泰初官至寶謨閣待詔遊以乾道五年授夔州通判以次年閏六月十八日自山隂啓行十月二十七日抵夔州因述其道路所經以為是記遊本工文故于山川風土敘次頗為雅潔而于考訂古迹尤所留意如丹陽皇業寺即史所謂皇基寺避唐元宗諱而改李白詩所謂新豐酒者地在丹陽鎮江之間非長安之新豐甘露寺狠石多景樓皆非故迹真州迎鑾鎮乃徐溫改名非周世宗時所改梅堯臣題瓜步祠詩誤以魏太武帝為曹操廣惠寺祭悟空禪師文石刻保大九年乃南唐元宗非後主庾亮樓當在武昌不應在江州白居易詩及張舜臣南遷志並相沿而誤歐陽修詩江上孤峯蔽緑蘿句緑蘿乃溪名非泛指藤蘿宋玉宅在秭歸縣東舊有石刻因避太守家諱毁之皆足備輿圖之考證他如解杜甫詩長年三老字及攤錢字解蘇軾詩玉塔卧微瀾句解南唐以七月六日作七夕之由辨李白集中姑熟十脈歸來乎笑矣乎僧伽歌懷素草書歌諸篇皆宋敏求所竄入亦足廣見聞其他搜尋金石引據詩文以參證地理者尤不可殫數非他家行記徒流連風景記載瑣屑者比也乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:79d538c6a9d4498a67fd94f31edd50bb95e56c1e6231dab14709c3f88ec495d8
