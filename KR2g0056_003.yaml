body:
  text: 入蜀記卷三宋陸游撰十六日過新野夾有石瀨茂林始聞秋鶯沙際水牛至多往往數十為羣吳中所無也地屬興國軍大治縣當是土産所宜爾晚過道士磯石壁數百尺色正青了無竅穴而竹樹迸根交絡其上蒼翠可愛自過小孤臨江峯嶂無出其右磯一名西塞山即元真子漁父辭所謂西塞山前白鷺飛者李太白送弟之江東云西塞當中路南風欲進船必在荆楚作故有中路之句張文潛云危磯插江生石色擘青玉殆為此山寫真又云已逢嫵媚散花峽不泊艱難道士磯蓋江行惟馬當及西塞最為湍險難上拋江泊散花洲洲與西塞相直前一夕月猶未極圎蓋望正在是夕空江萬頃月如紫金盤自水中涌出平生無此中秋也十七日過回風磯無大山蓋江濵石磧耳然水急浪湧舟過甚艱過蘭溪東坡先生所謂山下蘭芽短浸溪者買鹿肉供膳晚泊巴河口距黃州二十里一市聚也有馬祈寺吳大帝刑馬壇傳云吳攻夀春刑白馬祭江神於此自蘭溪而西江面尤廣山阜平遠兩日皆逆風舟人以食盡欲來巴河糴米極力牽挽日皆行八九十里蘇黃門謫高安東坡先生送至巴河即此地也張文潛亦有巴河道中詩云東南地缺天連水春夏風高浪卷山十八日食時方行晡時至黃州州最僻陋少事杜牧之所謂平生睡足處雲夢澤南州然自牧之王元之出守又東坡先生張文潛謫居遂為名邦泊臨皋亭東坡先生所嘗寓與秦少游書所謂門外數步即大江是也煙波渺然氣象疏豁見知州右朝奉郎直祕閣楊由義通判右奉議郎陳紹復州治陋甚㕔事僅可容數客倅居差勝晚移舟竹園步蓋臨皋多風濤不可夜泊也黃州與樊口正相對東坡所謂武昌樊口幽絶處也漢昭烈用吳魯子敬䇿自當陽進住鄂縣之樊口即此地也十九日早游東坡自州門而東岡壟高下至東坡則地勢平曠開豁東起一壟頗高有屋三間一龜頭曰居士亭亭下面南一堂頗雄四壁皆畫雪堂中有蘇公像烏帽紫裘橫按笻杖是為雪堂堂東大栁傳以為公手植正南有橋榜曰小橋以莫忘小橋流水之句得名其下初無渠澗遇雨則有涓流耳舊止片石布其上近輒增廣為木橋覆以一屋頗敗人意東一井曰暗井取蘇公詩中走報暗井出之句寒泉尉齒但不甚甘又有四望亭正與雪堂相直在高阜上覽觀江山為一郡之最亭名見蘇公及張文潛集中坡西竹林古氏故物號南坡今已殘伐無幾地亦不在古氏矣出城五里至安國寺亦蘇公所嘗寓兵火之餘無復遺迹惟繞寺茂林啼鳥似猶有當時氣象也郡集於棲霞樓本太守閭丘孝終公顯所作蘇公樂府云小舟橫截春江卧看翠壁紅樓起正謂此樓也下臨大江煙樹微茫遠山數㸃亦佳處也樓頗華潔先是郡有慶瑞堂謂一故相所生之地後毁以新此樓酒味殊惡蘇公韲湯蜜汁之戲不虛發郡人何斯舉詩亦云終年飲惡酒誰敢憎督郵然文潛乃極稱黃州酒以為自京師之外無過者故其詩云我初謫官時帝問司酒神同此好飲徒聊給酒養真去國一千里齊安酒最醇失火而得雨仰戴天公仁豈文潛謫黃時適有佳匠乎循小徑繚州宅之後至竹樓規模甚陋不知當三元之時亦止此耶樓下稍東即赤壁磯亦茅岡爾略無草木故韓子蒼待制詩云豈有危巢與棲鶻亦無陳迹但飛鷗此磯圖經及傳者皆以為周公瑾敗曹操之地然江上多此名不可考質李太白赤壁歌云烈火張天照雲海周瑜於此敗曹公不指言在黃州蘇公尤疑之賦云此非曹孟德之困於周郎者乎樂府云故壘西邉人道是當日周郎赤壁蓋一字不輕下如此至韓子蒼云此地能令阿瞞走則真指為公瑾之赤壁矣又黃人實謂赤壁曰赤鼻尤可疑也晚復移舟菜園步又遠竹園三四里蓋黃州臨大江了無港澳可泊或云舊有澳郡官厭過客故塞之二十日曉離黃州江平無風挽船正自赤壁磯下過多奇石五色錯雜粲然可愛東坡先生怪石供是也挽行十四五里江面始稍狹隔江岡阜延袤竹樹葱蒨漁家相映幽邃可愛復出大江過三江口極望無際泊戚磯港二十一日過雙栁夾回望江上遠山重復深秀自離黃雖行夾中亦皆曠遠地形漸高多種菽粟蕎麥之屬晚泊楊羅洑大隄高栁居民稠衆魚賤如土百錢可飽二十口又皆巨魚欲覓小魚飼猫不可得二十二日平旦微雨過青山磯多碎石及淺灘晚泊白楊夾口距鄂州三十里陸行止十餘里居民及泊舟甚多然大抵皆軍人也二十三日便風掛帆自十四日至是始得風食時至鄂州泊稅務亭賈船客舫不可勝計御尾不絶者數里自京口以西皆不及李太白贈江夏韋太守詩云萬舸此中來連帆過揚州蓋此郡自唐為衝要之地夔州迓兵來參見知州右朝奉郎張郯之彥輔運判官右朝奉大夫謝師稷市邑雄富列肆繁錯城外南市亦數里雖錢塘建康不能過隱然一大都會也吳所都武昌乃今武昌縣此州在吳名夏口亦要害故周公瑾求以精兵進住夏口而晉武帝亦詔王濬唐彬既定巴丘與胡奮王戎共平夏口武昌順流長騖也自江州至此七百里泝流雖日得便風亦須三四日韓文公云湓城去鄂渚風便一日耳過矣蓋退之未嘗行此路也二十四日早謝漕招食於漕園光華堂依山亭館十餘不甚葺晚郡集於奇章堂以唐牛思黯嘗為武昌節度使也二十五日觀大軍教習水戰大艦七百艘皆長二三十丈上設城壁樓櫓旗幟精明金鼓鞺鞳破巨浪往來捷如飛翔觀者數萬人實天下之壯觀也二十六日與統紓同游頭陀寺寺在州城之東隅石城山山繚繞如伏蛇自西亘東因其上為城缺壞僅存州治及漕司皆依此山寺毁於兵火汴僧舜廣住持三十年興葺略備自方丈西北躡支徑至絶頂舊有奇章亭今已廢四顧江山井邑靡有遺者李太白江夏贈韋南陵詩云頭陀雲外多僧氣正謂此寺也黃魯直亦云頭陀全盛時宫殿梯空級藏殿後有南齊王簡棲碑唐開元六年建蘇州刺史張庭圭溫玉書韓熙載撰碑隂徐鍇題額最後云唐嵗在己巳武昌軍節度觀察留後在軍州事楊州忠重立前鄂州唐年縣主簿祕書省正字韓夔書碑隂云乃命猶子夔正其舊本而刋寫之以是知夔為熙載兄弟之子也碑字前後一手又作溫字不全蓋南唐尊徐溫為義祖而避其名則此碑蓋䕫重書也碑隂又云皇上鼎新文物教被華夷如來妙㫖悉已遍窮百代文章罔不備舉故是寺之碑不言而興按此碑立於己巳嵗當皇朝之開寶二年南唐危蹙日甚距其亡六年爾熙載大臣不以覆亡為懼方且言其主鼎新文物教被華夷固已可怪又以窮佛㫖舉遺文及興是碑為盛誇誕妄謬真可為後世發笑然熙載死李主猶恨不及相之君臣之惑如此雖欲久存得乎唐制節度使不在鎮而以副大使或留後居任則云知節度事此云知軍州事蓋漸變也唐年縣本故唐時名梁改曰臨夏後唐復晉又改臨江然歷五代鄂州未嘗屬中原皆遙改耳故此碑開寶中建而猶曰唐年也至江南平始改崇陽云簡棲為此碑駢儷卑弱初無過人世徒以載於文選故貴之耳自漢魏之間駸駸為此體極於齊梁而唐尤貴之天下一律至韓吏部柳栁州大變文格學者翕然慕從然駢儷之作終亦不衰故熙載鍇號江左辭宗而拳拳於簡棲之碑如此本朝楊劉之文擅天下傳夷人亦駢儷也及歐陽公起然後掃蕩無餘後進之士雖有工拙要皆近古如此碑者今人讀不能終篇已坐睡矣而况效之乎則歐陽氏之功可謂大矣若魯直云唯有簡棲碑文章巋然立蓋戲也二十七日郡集於南樓在儀門之南石城上一曰黃鶴山制度閎偉登望尤勝鄂州樓觀為多而此獨得江山之要會山谷所謂江東湖北行畫圖鄂州南樓天下無是也下闞南湖荷葉彌望中為橋曰廣平其上皆列肆兩旁有水閣極佳但以賣酒不可住山谷云憑欄十里芰荷香謂南湖也是日早微雨晚晴二十八日同章冠之秀才甫登石鏡亭訪黃鶴樓故址石鏡亭者石城山一隅正枕大江其西與漢陽相對止隔一水人物草木可數唐沔州治漢陽縣故李太白沔州泛城南郎官湖詩序云白遷於夜郎遇故人尚書郎張謂出使夏口沔州牧杜公漢陽令王公觴於江城之南湖其後沔州廢漢陽以縣𨽻鄂州周世宗平淮南得其地復以為軍太白詩云誰道此水廣狹如一匹練江夏黃鶴樓青山漢陽縣大語猶可聞故人難可見形容最妙黃魯直宵征江夏縣睡起漢陽地亦此意老杜有公安送李晉肅入蜀余下沔鄂及登舟將適漢陽詩而卒於耒水可恨也漢陽負山帶江其南小山有僧寺者大别山也又有小别謂之二别云黃鶴樓舊傳費禕飛升於此後忽乘黃鶴來歸故以名樓號為天下絶景崔皓詩最傳而太白奇句得於此者尤多今樓已廢故趾亦不復存問老吏云在石鏡亭南樓之間正對鸚鵡洲猶可想見其地樓榜李監篆石刻獨存太白登此樓送孟浩然詩云孤帆遠映碧山盡惟見長江天際流蓋帆檣映遠山尤可觀非江行久不能知也復與冠之出漢陽門游仙洞止是石壁數尺皆直裂無洞穴之狀舊傳有仙人隱其中嘗啓洞出游老兵遇之得黃金數餅後化為石東坡先生有詩紀其事初不云所遇何人且太白固已云頗聞列仙人於此學飛術一朝向蓬海千載空石室今鄂人謂之吕公洞蓋流俗附會也有道人澶州人結廬洞側設吕公像其中洞少南即石鏡山麓粗頑石也色黃赤皴駁了不能鑑物可謂浪得名者由江濵堤上還船民居市肆數里不絶其間復有巷陌往來憧憧如織蓋四方商賈所集而蜀人為多二十九日早有廣漢僧世全左綿僧了證來附從人舟日昳移舟江口回望堤上樓閣重復燈火歌呼夜分乃已招醫趙隨為靈照視脈三十日黎明離鄂州便風掛帆沿鸚鵡洲南行洲上有茂林神祠遠望如小山洲蓋禰正平被殺處故太白詩云至今芳洲上蘭蕙不敢生梁王僧辨擊邵陵王綸軍至鸚鵡洲即此地也自此以南為漢水禹貢所謂嶓冢導漾東流為漢者水色澄徹可鑑太白云楚水清若空蓋言此也過謝家磯金雞洑磯不甚高而石皆橫裂如纍層甓得縮頸鯿魚重十斤洑中有聚落如小縣出鱘魚居民率以賣鮓為業晚泊通濟口自此入沌沌讀如篆字書云水名在江夏過九月則沌涸不可行必由巴陵至荆渚九月一日始入沌實江中小夾也過新潭有龍祠甚華潔自是遂無復居人兩岸皆葭葦彌望祠之百里荒又無挽路舟人以小舟引百丈入夜才行四五十里泊叢葦中平時行舟多於此遇盜通濟巡檢持兵來警邏不寐達旦二日東岸葦稍薄缺時見大江渺瀰蓋巴陵路也晡時次下郡始有二十餘家皆業漁釣蘆藩茅屋宛有幽致魚尤不論錢自此始復有挽路登舟背望竟陵遠山泊白臼有莊居數家門外皆古栁侵雲三日自入沌食無菜是日始得菘及蘆服然不肯斸根皆刈葉而已過八疊洑口皆有民居晚泊歸子保亦有十餘家多桑柘榆栁四日平旦始解舟舟人云自此陂澤深阻虎狼出沒未明而行則挽卒多為所害是日早見舟人焚香祈神云告紅頭須小使頭長年三老莫令錯呼錯喚問何謂長年三老云梢工是也長讀如長幼之長乃知老杜長年三老長歌裏白晝攤錢髙浪中之語蓋如此因問何謂攤錢云博也按梁冀能意錢之戲注云即攤錢也則攤錢之為博亦信矣過綱步有二十餘家在夕陽高栁中短籬曬罾小艇往來正如畫圖所見沌中之最佳處也泊畢家池地勢爽塏居民頗衆有一二家雖茅荻結廬而窗戶整潔藩籬堅壯舍旁有果園甚盛蓋亦一聚之雄也與諸子及二僧步登岸游廣福永固寺閴然無一人東偏白雲軒前橙方結實雖小而極香相與烹茶破橙抵莫乃還舟中畢家池蓋屬復州玉沙縣滄浪鄉云五日泊紫湄六日過東場並水皆茂竹高林隄淨如掃雞犬間暇鳬鴨浮沒人往來林樾間亦有臨渡喚船者使人恍然如造異境舟人云皆村豪園廬也泊雞鳴七日泊湛江八日早次江陵之建寧鎮蓋沌口也晉王澄棄荆州别駕郭舒不肯從澄下乃留留屯沌口陳侯安都討王琳至沌口皆此地也阻風大魚浮水中無數凡行沌中七日自是泛江入石首縣界夜觀隔江燒蘆場煙焰亘天如火城光照舟中皆赤九日早謁后土祠道旁民屋苫茅皆厚尺餘整潔無一枝亂掛帆拋江行三十里泊塔子磯江濵大山也自離鄂州至是始見山買羊置酒蓋村步以重九故屠一羊諸舟買之俄頃而盡求菊花於江上人家得數枝芬馥可愛為之頽然徑醉夜雨極寒始覆絮衣十日阻風雨遣小舟橫絶江面至對岸買肉食得大魚之半又得一烏牡雞不忍殺畜於舟中俄有村翁持茭萌一束來餉不肯受直遣人先之夔晚晴開船窗觀月十一日舟行望西南一角水與天接舟人云是為潛軍港古嘗潛軍伺敵於此遙見港中有兩㸃正黑疑其遠樹則下不屬地久之漸近可辨蓋二千五百斛大舟也又有水禽雙浮江中色白類鵝而大楚人謂之天鵝飛騫絶高有弋得者味甚美或曰即鵠也泊三江口水淺舟行甚艱自此遂不復有山太白詩山隨平野盡江入大荒流蓋荆渚所作也十二日過石首縣不入石首自唐始為縣在龍蓋山之麓下臨漢水亦形勝之地杜子美有送石首薛明府詩即此邑也泊藕池十三日泊栁子夜過全證二僧舟中聽誦梵語般若心經此經惟蜀僧能誦十四日次公安古所謂油口也漢昭烈駐軍始更今名規模氣象甚壯兵火之後民居多茅竹然茅屋尤精緻可愛井邑亦頗繁富米斗六七十錢知縣右儒林郎周謙孫來湖州人游二聖報恩光孝禪寺二聖謂青葉髻如來婁至德如來也皆示鬼神力士之形高二丈餘隂威凛然可畏正殿中為釋迦右為青葉髻號大聖左為婁至德號二聖三像皆南面豫按藏經駒字函娑羅浮殊童子成道為青葉髻如來青葉髻如來再出世為樓至如來則二如來本一身耳有碑言邑人一夕同夢二神大言我青葉髻婁至德如來也有二巨木在江干我所運者俟鄯行者來令刻為我像已而果有人自稱鄯行者又善肖像邑人欣然請之像成人皆謂酷類所夢然碑無年月不知何代也長老祖珠南平軍人寺後有廢城髣佛尚存圖經謂之吕蒙城然老杜乃曰地曠吕䝉營江深昭烈城蓋𤣥德子明皆屯於此也老杜曉發公安詩注云數月憩息此縣按公移居公安詩云水煙通徑草秋露接園葵而留别公安太易沙門詩云沙村白雪仍含凍江縣紅梅已放春則是以秋至此縣暮冬始去其曰數月憩息蓋為此也泊彌節亭馴鷗低飛往來竟日不去十五日周令說縣本在近北枕漢水沙虛岸摧漸徙而南今江流乃昔市邑也又云縣有五鄉然共不及二千戶地曠民寡如此民耕尤苦隄防數壞嵗嵗增築不止晚攜家再游二聖寺衆寮有維摩刻木像甚佳云沙市工人所為也方丈西有竹軒頗佳珠老說五祖法演禪師初住四面山了然獨處凡二年始有一道士來問道乃請作知事又三年僧寶艮來與道士朝夕參叩皆得法於是演公之道寖為人知而四方學者始稍有至者雖其後門人之盛稱天下然終身不過數十衆珠聞此於其師卍菴顔禪師荆州絶無禪林惟二聖而已然蜀僧出關必走江浙回者又已自謂有得不復參叩故語云下江者疾走如煙上江者鼻孔撩天徒勞他二佛打供了不見一僧坐禪十六日過白湖渺然無津拋江至升子鋪有天鵝數百翔泳水際日入泊沙市自公安至此六十里自此至荆南陸行十里舟不復進矣老杜詩云買薪猶白帝鳴櫓已沙頭劉夢得云沙頭檣干上始見春江潤皆謂此也十七日日入後遷行李過嘉州趙青船蓋入峽船也沙市堤上居者大抵皆蜀人不然則與蜀人為㛰姻者也十八日見知府資政殿學士劉恭父珙通判右奉議郎權嗣衍左宣教郎陳孺荆南圖經以為楚之郢都梁元帝亦嘗都焉唐為江陵府荆南節度今因之然牧守署銜但云知荆南軍府與永興河陽正同初無意義但㳂舊而已十九日郡集於新橋馬監監在西門外四十里自出城即黃茅彌望每十餘里有村疃數家而已道遇數十騎從獵獲狐兔皆繫鞍上割鮮藉草而飲云襄陽軍人也是日極寒如窮冬土人云此月初己嘗有雪二十日倒檣竿立於牀蓋上峽惟用檣及百丈不復張帆矣百丈以巨竹四破為之大如人臂豫所乘千六百斛舟凡用檣六枝百丈兩車二十一日劉師丁內艱分迓兵之半負肩輿自山路先歸夔州是日重霧四塞二十二日五鼓赴能仁院建會慶節道場中夜後舟人祀峽神屠一豨二十三日奠劉師母安定郡太夫人卓氏劉師受弔禮與吳人同二十四日見左朝奉郎湖北安撫司主管機宜文字牛達可右奉議郎安撫司幹辦公事湯衡右朝奉郎安撫同幹辦公事趙藴二十五日右文林郎知歸州興山縣高祁來二十六日修船始畢骨肉入新船祭江瀆廟用壺酒特豕廟在沙市之東三四里神曰昭靈孚應威惠廣源王蓋四瀆之一最為祀典之正者然兩廡淫祠尤多蓋荆楚舊俗也司法參軍右迪功郎王師㸃録其叔祖君儀待制訟卦講義來君儀嚴州人師事先大父精於易然遺書不傳講義止存一篇而已然亦其少作也入蜀記卷三
