body:
  text: 入蜀記卷一宋陸遊撰乾道五年十二月六日得報差通判夔州方久病未堪逺役謀以夏初離鄉里六年閏五月十八日晚行夜至法雲寺兄弟餞别五鼓始決去十九日黎明至柯橋館見送客已時至錢清食亭中涼爽如秋與諸子及送客步過浮橋橋堅好非昔比亭亦華潔皆史丞相所建也申後至蕭山縣憩夢筆驛驛在覺苑寺旁世傳寺乃江文通舊居也有大碑葉道卿文寺額及佛殿榜皆沈睿逹所書有碑亦睿達書尤精古又有毗陵人戚舜臣所畫水蓋佛後座大壁也卒然見之覺濤瀾洶湧可駭前輩或謂之死水過矣縣丞權縣事紀旬尉曽槃來曽原伯逢招飲於其子槃廨中二鼓歸原伯復來共坐驛門月如晝極涼四鼓解舟行至西興鎮二十日黎明渡江江平無波少休仙林寺寺僧為開館設湯飲遂買小舟出北關登漕司所假舟於紅亭稅務之西夜無蚊二十一日省三兄二十二日至二十四日皆留兄家二十五日晚葉夢錫侍郎衡招飲案間設山礬數盆望之如雪二十六日晚芮國器司業曄招飲同集仲高兄詹道子大著亢宗張叔潛編修淵坐中國器云頃在廣東作漕有提舉茶鹽石端義者性殘忍每捕官吏繫獄輒以石鹽木枷枷之蓋木之至堅重者每曰木名石鹽天生此為我用也其後石坐罪竟荷校云二十七日二十八日同仲高出暗門買小舟泛西湖至長橋寺豫不至臨安八年矣湖上園苑竹樹皆老蒼高栁造天僧寺益葺而舊交多已散去或貴不復相通為之絶嘆二十九日沈持要檢正樞招飲邂逅趙德莊少卿彥端晚出湧金門並湖繞城至舟中三十日六月一日早移舟出閘幾盡一日始能出三閘船舫櫛比熱甚午後小雨熱不解泊糴場前二日禺中解舟鄉僕來言鄉中閔雨村落家家車水比連三年頗稔今春父老言占嵗可憂不知終何如也過赤岸班荆館小休前亭班荆者北使宿頓及賜燕之地距臨安三十六里晚急雨頗涼宿臨平臨平者太師蔡京葬其父凖於此以錢塘江為水會稽山為案山形如駱駝葬於駝之耳而築塔於駝之峯蓋葬師云駝負重則行逺也然東坡先生樂府固已云誰似臨平山上塔亭亭迎客西來送客行則臨平有塔亦久矣當是蔡氏葬後增築或遷之耳京責太子少保制云託祝聖而飾臨平之山是也夜半解舟三日黎明至長河堰亦小市也魚蟹甚富午後至秀州崇德縣縣令右從政郎具道夫丞右承直郎李植監秀州都稅務右從政郎章湜來舊聞戴子微云崇德有市人吳隱忽棄家寓旅邸終日默坐一室室中惟一卧榻客至共坐榻上或載酒過之亦不拒清談竟日隱初不學問至是間與人言易數皆造精微亦能先知人吉凶夀夭見者莫能測也因見吳令問之云皆信然今徙居村落間矣是晚行闕時可讀蘇州刺史于頔書大略言祕書監陸公齊望始作尼寺於此其後灞滻灃兄弟又新之後又有賢妹字意者陸氏嘗有女子為尼云然不言宣公所以有祠者家譜灃賴此證誤諱灞者則宣公之父也老尼妙濟大師法淳及其弟子居白留啜茶且言方新祠堂也移舟北門宣化亭晚復過務德飯六日右奉議郎新通判荆南吕援來援字彥能進士聞人綱來綱字伯紀方務德館客自言識毛德昭德昭名文衢州江山縣人居於秀豫兒時從之甚久德昭極苦學中年不幸病盲而卒無子綱言其盲後猶終日危坐默誦六經至數千言不已可哀也赴郡集於倅廨中坐花月亭有小碑乃張先子野雲破月來花弄影樂章云得句於此亭也晚赴方夷吾導之集於陳大光縣丞家二樊吕倅皆在大光字子充瑩中諫議孫居第潔雅末利花盛開七日早遍辭諸人赴方務德素飯晚移舟出城泊禾興館前館亦頗閎壯終日大雨不止招薑醫視家人及綯八日雨霽極涼如深秋遇順風舟人始張帆過合路居人繁夥賣鮓者尤衆道旁多軍中牧馬運河水泛溢高於近村地至數尺兩岸皆車出積水婦人兒童竭作亦或用牛婦人足踏水車手猶績麻不置過平望遇大雨暴風舟中盡濕少頃齊止宿八尺聞行舟有覆溺者小舟叩舷賣魚頗賤蚊如蜂蠆可畏九日晴而風舟人懲昨夕狼狽不敢解舟日高方行自至崇德行大澤中至此始望見震澤遠山午間至吳江縣渡松江風極靜癯庵竹樹益茂而主人死矣知縣右承議郎管銃尉右迪功郎周郔來縣治有石刻曾文清公漁具圖詩前知縣事栁楹所刻也漁具比松陵倡和集所載又增十事云託周尉招醫鄭端誠為統綯疹脈皆病暑也市中賣魚鮓頗珍晚解舟中流回望長橋層塔煙波渺然真若圖畫宿尹橋登橋觀月十日至平江以疾不入沿城過盤門望武丘樓塔正如吾鄉寶林為之慨然宿楓橋寺前唐人所謂夜半鐘聲到客船者十一日五更發楓橋曉過許市居人極多至望亭小憩自是夾河皆長岡高壟多陸種菽粟或灌木叢篠氣象窘隘非楓橋以東比也近無錫縣始稍平曠夜泊縣驛近邑有錫山出錫漢末讖記云有錫天下兵無錫天下清有錫天下爭無錫天下寧至今錫見輒掩之莫敢取者十二日早謁喻子材郎中樗子材來謝以兩夫荷轎不持胡牀手自授謁云知縣右奉議郎吳灃來晚行夜四鼓至常州城外十三日早入常州泊荆溪館夜月如晝與家人步月驛外綯始小愈十四日早見知州右朝奉大夫李安國通判右朝奉郎蔣誼員外倅左朝散郎張堅堅文定公綱之子教授左文林郎陳伯達員外教授左從政郎沈瀛司戶右從政郎許伯虎來伯達字兼善瀛字子夀皆未識子夀仍出近文一卷伯虎字子威余兒時筆硯之舊也至東嶽廟觀古檜數百年物也又小憩崇勝寺納涼遂解舟甲夜過奔牛閘宋明帝遣沈懷明擊孔覬至奔牛築壘即此也閘水湍激有聲甚壯遂抵吕城閘自祖宗以來天下置堰軍止四處而吕城及京口二閘在焉十五日早過吕城閘始見獨轅小車過陵口見大石獸偃仆道旁已殘缺蓋南朝陵墓齊明帝時王敬則反至陵口慟哭而過是也豫頃嘗至宋文帝陵道路猶極廣石柱承露盤及麒麟辟邪之類皆在柱上刻太祖文皇帝之神道八字又至梁文帝陵文帝武帝父也亦有二辟邪尚存其一為藤蔓所纒若縶縛者然陵已不可識矣其旁有皇業寺蓋史所謂皇基寺也疑避唐諱所改二陵皆在丹陽距縣三十餘里郡士蔣元龍子雲謂豫曰毛達可作守時有賣黃金石榴來禽者疑其盜捕得之果發梁陵所得夜抵丹陽古所謂曲阿或曰雲陽謝康樂詩云朝日發雲陽落日到朱方蓋謂此也十六日早發丹陽汲玊乳井水井在道旁觀音寺名列水品色類牛乳甘冷尉齒井額陳文忠公所作堆玊八分也寺前又有練光亭下闞練湖亦佳境距官道甚近然過客罕至是日見夜合花方開故山開過已月餘氣候不齊如此過夾岡有二石人植立岡上俗謂之石翁石媪其實亦古陵墓前物自京口抵錢塘梁陳以前不通漕至隋煬帝始鑿渠八百里皆濶十丈夾岡如連山蓋當時所積之土朝廷所以能駐蹕錢塘以有此渠耳汴與此渠皆假手隋氏而為吾宋之利豈亦有數耶過新豐小憩李太白詩云南國新豐酒東山小妓歌又唐人詩云再入新豐市猶聞舊酒香皆謂此非長安之新豐也然長安之新豐亦有名酒見王摩詰詩至今居民市肆頗盛夜抵鎮江城外是日立秋十七日平旦入鎮江泊船西驛見知府右朝散郎直祕閣蔡洸子平都統慶遠軍節度使成閔通判右朝奉大夫章汶右朝奉郎陶之真府學教授左文林郎熊克總領司幹辦公事右承奉郎史彌正端叔十八日右奉議郎簽書節度判官廳公事葛郇觀察推官右文林郎徐務滋司戶參軍左迪功郎楊沖焦山長老定圜甘露長老化昭來十九日金山長老寶印來字坦叔嘉州人自言峽州以西灘不可勝計白傅詩所謂白狗到黃牛灘如竹節稠是也赴蔡守飯於丹陽樓熱特甚堆冰滿坐了無涼意蔡自點茶頗工而茶殊下同坐熊教授建寧人云建茶舊雜以米粉復更以薯蕷兩年來又更以楮芽與茶味頗相入且多乳惟過梅則無復氣味矣非精識者未易察也申後移舟出三閘至潮閘而止二十日遷入嘉州王知義船微雨極涼二十一日二十二日郡集衛公堂後圃比舊唯增染香亭飲半登夀丘普照寺終宴夀丘者宋高祖宅有故井尚存寺本名延慶隆興中復泗州有普照寺僧奉僧伽像來歸寓焉因賜名普照寺僑置僧伽道場東望京山連亘抱合勢如繚墻官寺樓觀如畫西闞大江氣象極雄偉也二十三日至甘露寺飯僧甘露蓋北固山也有狠石世傳以為漢昭烈吳大帝嘗據此石共謀曹氏石亡已久寺僧輒取一石充數遊客摩挲太息僧及童子輩往往竊笑也拜李文饒祠登多景樓樓亦非故趾主僧化昭所築下臨大江淮南草木可數登覽之勝實過於舊邂逅左迪功郎新太平州教授徐容容字子公泉州人此山多峭崖如削然皆土也國史以為石壁峭絶誤矣二十四日二十五日早以一豨壺酒謁英靈助順王祠所謂下元水府也祠屬金山寺寺常以二僧守之無他祝史然榜云賽祭豬頭例歸本廟觀者無不笑初紹興末完顔亮入境樞密葉公審言督視六軍守江禱於水府祠請事平奏加帝號既而不果隆興中敵再入有近臣申言之議者謂四瀆止封王水府不應在四瀆上乃但加美稱而已廟中遇武人王秀自言博州人年五十一完顔亮入邊時自河朔從義軍攻下大名以待王師既歸朝不見録且自言孤逺無路自通歔欷不已是晚欲出江舟人辭以潮不應遂宿江口二十六日五鼓發船是日舟人始伐鼓遂遊金山登玉鑑堂妙高臺皆窮極壯麗非昔比玊鑑蓋取蘇儀甫詩云僧於玊鑑光中坐客踏金鼇背上行儀甫果終於翰苑當時以為詩讖新作寺門亦甚雄翟耆年伯夀篆額然門乃不可泊舟凡至寺中者皆由雄跨閣長老寶印言舊額仁宗皇帝御飛白張之則風濤洶湧蛟鼉出沒遂藏之寺閣今不復存矣印住山近十年興作皆其力寺有兩塔本曾子宣丞相用西府俸所建以薦其先者政和中寺為神霄宫道士乃去塔上相輪而屋之謂之鬱羅霄臺至是五十餘年印乃復為塔且增飾之工尚未畢山絶頂有吞海亭取毛吞巨海之意登望尤勝每北使來聘例延至此亭烹茶金山與焦山相望皆名藍每爭雄長焦山舊有吸江亭最為佳處故此名吞海以勝之可笑也夜風水薄船鞺鞳有聲二十七日留金山極涼冷印老言蜀中梁山軍鷺鷥為天下第一二十八日夙興觀日出江中天水皆赤真偉觀也因登雄跨閣觀二島左曰鶻山舊傳有栖鶻今無有右曰雲根島皆特起不附山俗謂之郭璞墓奉使金國起居郎范至能至山遣人相招食於玉鑑堂至能名成大聖政時同官相别八年今借資政殿大學士提舉萬夀觀侍讀為金國祈請使云午間過瓜洲江平如鏡舟中望金山樓觀重復尤為巨麗中流風雷大作電影騰掣止在江面去舟才丈餘急繫纜俄而開霽遂至瓜洲自到京口無蚊是夜蚊多始復設㡡二十九日泊瓜洲天氣澄爽南望京口月觀甘露寺水府廟皆至近金山尤近可辨人眉目也然江不可橫絶放舟而西乃能達故渡者皆遲回久之舟人以帆弊往姑蘇買帆是日方至檣高五丈六尺帆二十六幅兩日間閲往來渡者無慮千人大抵多軍人也夜觀金山塔燈七月一日黎明離瓜洲便風挂帆晚至真州泊鑒遠亭州本唐揚州揚子縣之白沙鎮楊溥有淮南徐溫自金陵來覲溥於白沙因改曰迎鑾鎮或謂周世宗征淮時諸將嘗於此迎謁非也國朝乾德中升為建安軍祥符中建玊清昭應宫即軍之西北小山置冶鑄玉皇聖祖太祖太宗四聖像既成遣丁謂李宗諤為迎奉闕副至京車駕出迎肆赦建軍曰真州而於故治築儀真觀政和中修九域圖志又名曰儀真郡舊以水陸之衝為發運使治所今廢二日見知州右朝奉郎王察市邑官寺比數年前頗盛擕統遊東園園在東門外里餘自建炎兵火後廢壞滌地漕司租與民嵗入錢數千昔之閎壯巨麗復為荆棘荒墟之地者四十餘年乃更葺為園以記考之惟清宴堂拂雲亭澄虛閣粗復其舊與右之清池北之高臺尚存若所謂流水橫其前者湮塞僅如一帶而百畝之園廢為蔬畦者尚過半也可為太息登臺望下蜀諸山平遠可愛裴回久之過報恩光孝寺少留辛巳之變儀真焚蕩無餘而此寺獨存堂中僧百人長老妙湍常州人三日右迪功郎監稅務聞人堯民來堯民茂德刪定之兄子以恩科入官北山永慶長老藴常來郡集於平易堂遍遊澄瀾閣快哉亭遂至壯觀以歸壯觀舊有米元章所作賦石刻今亡矣初問王守儀真觀去城遠近云在城南里許方怪與國史異既歸亟往遊則信城南也有老道士年七十餘自言廬州人能述儀真本末云舊觀實在城西北數里小闕山之麓祥符所鑄乃金銅像并座高三丈以黃麾全仗道門幢節迎赴京師皆與國史合故當時樂章曰范金肖像申嚴奉宫館狀翬飛萬靈拱衛瑞煙披堤栁映黃麾道士又言賜號瑞應福地則史所不載也今所謂儀真觀者昔黃冠入城休憩道院耳晚大風舟人增纜四日風便解纜挂帆發真州岸下舟相先後發者甚衆煙帆映山縹眇如畫有頃風愈厲舟行愈疾過瓜步山山蜿蜒蟠伏臨江起小峯頗巉峻絶頂有元魏太武廟廟前大木可三百年一井已眢傳以為太武所鑿不可知也太武以宋文帝元嘉二十七年南侵至瓜步建康戒嚴太武鑿瓜步山為蟠道於其上設氊廬大會羣臣疑即此地王文公詩所謂叢祠瓜步認前朝是也梅聖俞題廟云魏武敗忘歸孤軍駐山頂按太武初未嘗敗聖俞誤以佛貍為曹瞞耳山出瑪瑙石多虎豹害人往時大將劉寶每募人捕虎於此周世宗伐南唐齊王景達自瓜步渡江距六合二十里設柵亦此地也入夾行數里沿岸園疇衍沃廬舍竹樹極盛大抵多長蘆寺莊出夾望長蘆樓塔重復自江淮兵火官寺民廬莫不殘壞獨此寺之盛不減承平至今日常數百衆江面渺瀰無際殊可畏李太白詩云維舟至長蘆目送煙雲高是也晚泊竹篠港有居民三十餘家距金陵三十里五日大風將曉覆夾衾晨起淒然如暮秋過龍灣浪湧如山望石頭山不甚高而峭立江中繚繞如垣牆凡舟皆由此下至建康故江左有變必先固守石頭真控扼要地也自新河入龍光門城上舊有賞心亭白鷺亭在門右近又創二水亭在門左誠為壯觀然賞心為二亭所蔽頗失往日登望之勝泊秦淮亭説者以為鍾阜艮山得庚水為宗廟水秦鑿淮本欲破金陵王氣然庚水反為吉天下事信非人力所能勝也見留守右朝請大夫祕閣修撰唐瑑通判右朝散郎潘恕建康行宫在天津橋北橋琢青石為之頗精緻意其南唐之舊也晚小雨右文林郎監大軍倉王烜來王言京口人用七月六日為七夕蓋南唐重七夕而常以帝子鎮京口六日輒先乞巧翌旦馳入建康赴內宴故至今為俗云然太宗皇帝時常下詔禁以六日為七夕則是北俗亦如此此説恐不然六日見左朝散大夫太府少卿總領兩淮財賦沈夏武泰軍節度使建康諸軍都統郭振右宣教郎知江寧縣何作善右文林郎觀察推官褚意來作善字百祥意字誠叔晚見秦伯和侍郎伯和名塤故相益公檜之孫延坐畫堂棟宇閎麗前臨大池池外即御書閣蓋賜第也家人病創託何令招醫劉仲寶視脈七日早遊天慶觀在冶城山之麓地理家以為此山脈絡自蔣山來不可知也吳晉間城壘大抵多因山為之觀西有忠烈廟卞壼廟也以嵇紹及壼二子眕盱配食紹死於惠帝時在壼前且非江左事而以配壼非也廟後叢木甚茂傳以為壼墓墓東北又有亭頗疏豁曰忠孝亭亭本南唐忠貞亭後避諱改焉忠貞壼諡今曰忠孝則并以其二子死父難也雲堂道士陳德新字可久姑蘇人頗開敏相從登覽久之遂出西門遊清涼廣慧寺寺距城里餘據石頭城下臨大江南直牛頭山氣象甚雄然壞於兵火舊有德慶堂在法堂前堂榜乃南唐後主撮襟書石刻尚存而堂徙於西偏矣又有祭悟空禪師文曰保大九年嵗次辛亥九月皇帝以香茶乳藥之奠致祭於右街清涼寺悟空禪師按南唐元宗以癸卯嵗嗣位改元保大當晉出帝之天福八年至辛亥實保大九年當周太祖之廣順元年則祭悟空者元宗也建康志以為後主非是長老寶餘楚州人留食贈德慶堂榜墨本食已同登石頭西望宣化渡及厯陽諸山真形勝之地若異時定都建康則石頭當仍為關要或以為今都城徙而南石頭雖守無益蓋未之思也惟城既南徙秦淮乃橫貫城中六朝立柵斷航之類緩急不可復施然大江天險都城臨之金湯之勢比六朝為勝豈必依淮為固耶左迪功郎新湖州武康尉劉煒右迪功郎監比較務李膺來煒秦伯和館客也言秦氏衰落可念至屢典質生産亦薄問其嵗入幾何曰米十萬斛耳八日晨至鍾山道林真覺大師塔焚香塔在太平興國寺上寶公所葬也塔中金銅寶公像有銘在其膺蓋王文公守金陵時所作僧言古像取入東都啓聖院祖宗時每有祈禱啓聖及此塔皆設道場考之信然塔西南有小軒曰木末其下皆大松髯甲夭矯如蛟龍往往數百年物木末蓋後人取王文公詩木末北山雲冉冉之句名之建康志謂公自命此名非也塔後又有定林菴舊聞先君言李伯時畫文公像於菴之昭文齋壁著帽束帶神彩如生文公沒齋常扄閉遇重客至寺僧開戶客忽見像皆驚聳覺生氣逼人寫照之妙如此今菴經火尺椽無復存者豫乙酉秋嘗雨中獨來遊留字壁間後人移刻崖石讀之感歎蓋已五六年矣歸途過半山少留半山者王文公舊宅所謂報寧禪院也自城中上鍾山此為中途故曰半山殘毁尤甚寺西有土山今謂之培塿亦後人取文公詩所謂溝西顧丁壯擔土為培塿名之也寺後又有謝安墩文公詩云在冶城西北即此是也九日至保寧戒壇二寺保寧有鳳凰臺攬輝亭臺有李太白詩云三山半落青天外二水中分白鷺洲今已廢為大軍甲仗庫惟亭因舊趾重築亦頗宏壯寺僧言亭榜本朱希真𨽻書已為俗子易之矣堂後有片石瑩潤如黑玉乃宋子嵩詩題云鳳臺山亭子陳獻司空鄉貢進士宋齊丘司空者徐知誥也後改姓名曰李升是為南唐烈祖而齊丘為大臣後又有題字云升元三年奉敕刻石蓋烈祖既有國追念君臣相遇之始而表顯之升齊丘雖皆不足道然當攘奪分裂橫潰之時其君臣相遇不如是亦不能粗成其功業也戒壇額曰崇勝戒壇寺古謂之瓦棺寺有閣因岡阜其髙十丈李太白所謂鍾山對北戶淮水入南榮者又橫江詞一風三日吹倒山白浪高於瓦棺閣是也南唐後主時朝廷遣武人魏丕來使南唐意其不能文即宴於是閣因求賦詩丕攬筆成篇末句云莫教雷雨損基扄後主君臣皆失色及南唐之亡為吳越兵所焚國朝承平二百年金陵為大府寺觀競以崇飾土木為事然閣終不能復紹興中有北僧來居講惟識百法論誓復興造求偉材於江湖間事垂集者屢矣會建宫闕有司往往輒取之僧不以此動心愈益經營卒成盧舍那閣平地高七丈雄麗冠於江東舊閣基相距無百步今廢為軍營秦伯和遣醫柴安恭來視家人疾柴邢州龍岡人晚禇誠叔來誠叔嘗為福州閩清尉獲盜應格當得京官不忍以人死為己利辭不就至今在選調又有為他邑尉者亦獲盜營賞甚力卒得京官將解去入郡過刑人處輒掩目大呼數日神志方定後至他郡見通衢有石幢問此何為從者曰法場也亦大駭呌呼幾墜車自此所至皆迂道以避刑人之地人之不可有愧於心如此移舟泊賞心亭下秦伯和送藥十日早出建康城至石頭得便風張帆而行然港淺而狹行亦甚緩宿大城岡金陵岡隴重復如梅嶺岡石子岡佘讀如蛇婆岡尤其著者也居民數十家亦有店肆十一日早出夾行大江過三山磯烈洲慈姥磯采石鎮泊太平州江口謝玄暉登三山還望京邑李太白登三山望金陵皆有詩凡山臨江皆曰磯水湍急篙工併力撑之乃能上然今年閏餘秋早水落已數尺矣則盛夏可知也三山自石頭及鳯皇臺望之杳杳有無中耳及過其下則距金陵才五十餘里晉伐吳王濬舟師過三山王渾要濬議事濬舉帆曰風利不得泊即此地也是日便風擊鼓挂帆而行有兩大舟東下者阻風泊浦溆見之大怒頓足詬罵不已舟人不答但撫掌大笑鳴鼓愈厲作得意之狀江行淹速常也得風者矜而阻風者怒可謂兩失之矣世事蓋多類此者記之以寓一笑烈洲在江中上有小山曰烈山草木極茂密有神祠在山巔慈姥磯磯之尤巉絶峭立者徐師川有慈姥磯詩序云磯與望夫石相望正可為的對而詩人未嘗挂齒牙故其詩云離鸞只説閨中恨舐犢誰知目下情然梅聖俞護母喪歸宛陵發長蘆江口詩云南國山川都不改傷心慈姥舊時磯師川偶忘之耳聖俞又有過慈姥磯下及慈姥山石崖上竹鞭詩皆極高奇與此山稱采石一名牛渚與和州對岸江面比瓜洲為狹故隋韓擒虎平陳及本朝曹彬下南唐皆自此渡然微風輒浪作不可行劉賔客云蘆葦晚風起秋江鱗甲生王文公云一風微吹萬舟阻皆謂此磯也磯即南唐樊若冰獻䇿作浮梁渡王師處初若冰不得志於李氏詐祝髮為僧廬於采石山鑿石為竅及建石浮圖又月夜繫繩於浮圖棹小舟急渡引繩至江北以度江面既習知不謬即亡走京師上書其後王師南渡浮梁果不差尺寸豫按隋煬帝征遼蓋嘗用此䇿渡遼水造三浮橋於西岸既成引趨東岸橋短丈餘不合隋兵赴水接戰高麗乘岸上擊之麥鐵杖戰死始斂兵引橋復就西岸而更命何稠接橋二日而成遂乘以濟然隋終不能平髙麗國朝遂下南唐者實天意也若冰何力之有方若冰之北走也江南皆知其獻南征之䇿或請誅其母妻李煜不敢但羈置池州而已其後若冰自陳母妻在江南朝廷命煜護送煜雖憤切終不敢違厚遺而遣之然若冰所鑿石竅及石浮圖皆不毁王師卒用以繫浮梁則李氏君臣之暗且怠亦可知矣雖微若冰有不亡者乎張文潛作平江南議謂當縛若冰送李煜使甘心焉不然正其叛主之罪而誅之以示天下豈不偉哉文潛此説實天下正論也豫自金陵得疾是日方小愈尚未能食夜雨十二日早移舟泛姑熟溪五里泊閲武亭初詢舟人云江口泊船處距城二十里須步乃可入及至閲武乃止在城闉之外徽猷閣直學士左朝請郎知州周元特操聞豫病與醫郭師顯俱來視疾自都下相别逮今八年矣太平州本金陵之當塗縣周世宗時南唐元宗失淮南僑置和州於此謂之新和州改為雄遠軍國朝開寶八年下江南改為平南軍然獨領當塗一邑而已太平興國二年遂以為州且割蕪湖繁昌來屬而治當塗與興國軍同時建置故分紀年以名之十三日通判右朝請郎葉棼員外通判左朝奉郎錢同仲耕軍事判官左文林郎趙子覭知當塗縣右通直郎王權來午後入州見元特呼郭醫就坐問為豫切脈且議所用藥州正據姑熟溪北土人但謂之姑溪水色正緑而澄徹如鏡纎鱗往來可數溪南皆漁家景物幽奇兩浮橋悉在城外其一通宣城其一可至浙中姑熟堂最號得溪山之勝適有客寓家其間故不得至又有一酒樓登望尤佳皆城之南也往時溪流分一支貫城中湮塞已久近嵗嘗浚治然惟春夏之交暫通今七月已絶流矣李太白集有姑熟十詠豫族伯父彥遠嘗言東坡自黃州還過當塗讀之撫手大笑曰贋物敗矣豈有李白作此語者郭功父爭以為不然東坡又笑曰但恐是太白後身所作耳功父甚愠蓋功父少時詩句俊逸前輩或許之以為太白後身功父亦遂以自負故東坡因是戲之或曰十詠及歸來乎笑矣乎僧伽歌懷素草書歌太白舊集本無之宋次道再編時貪多務得之過也十四日晚晴開南窗觀溪山溪中絶多魚時裂水面躍出斜日映之有如銀刀垂釣挽罟者彌望以故價甚賤僮使輩日皆饜飫土人云此溪水肥宜魚及飲之水味果甘豈信以肥故多魚耶溪東南數峯如黛蓋青山也入蜀記卷一
