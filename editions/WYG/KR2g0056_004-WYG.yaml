body:
  text: 入蜀記卷四宋陸游撰二十七日解舟擊鼓鳴鉦舟人皆大噪擁堤觀者如堵牆泊新河口距沙市三四里葢蜀人修船處二十八日泊方城有嘉州人王百一者初應募為船之招頭招頭葢三老之長顧直差厚每祭神得胙肉倍衆人既而船戸趙清改用所善程小八為招頭百一失職怏怏又不决去遂發狂赴水予急遣人拯之流一里餘三没三踊僅得出一招頭得䘮能使人至死况大於此者乎二十九日阻風十月一日過𤓰州壩倉頭百里洲泊沱㴩皆聚落竹樹鬱然民居相望亦有村夫子聚徒敎授羣童見船過皆挾書出觀亦有誦書不輟者沱江别名詩江有沱禹貢岷山導江東别為沱是也㴩則爾雅所謂春夏秋有水冬無水曰㴩也二日泊桂林灣全證二僧陸行來云沿路民居大抵多四方人土著纔十一也舟人殺猪十餘口祭神謂之開頭三日舟人分胙行差晚與兒輩登堤觀蜀江乃知李太白荆門望蜀江詩江色緑且明為善狀物也自離塔子磯至是始望見巴山山在松滋縣泊灌子口葢松滋枝江兩邑之間松滋晉縣自此入蜀江枝江唐縣古羅國也江陵九十九洲在焉晉栁約之羅述甄季之聞桓𤣥死自白帝至枝江即此地也歐陽文忠公有枝江山行五言二十四韻葢文忠赴夷時自此陸行至峽州故其望州坡詩云崎嶇㡬日山行倦却喜陂頭見峽州灌子口一名松滋渡劉賔客有詩云巴人淚應猨聲落蜀客船從鳥道回四日過楊木寨葢松滋有四寨曰楊木車羊高平税家云泊龍灣五日過白羊市葢峽州宜都縣境上宜都唐縣也謁張文忠公天覺墓殘伐墓木横道㡬不可行天覺之子直龍圖閣茂巳卒二孫一有官病狂易一白丁也初作墓江濵已而不果𦵏改𦵏山間今墓是也而舊墓亦不復毁啟隧道出入中可容數十人坐有道人結屋其旁守之道人出一石刻草書云莫将外物尋奇寳須問真師决永鈆寄八瓊張子高鍾離權始自王屋游都下弟子浮玉山人來乞此字今又將西還丹元子再請書卷之末紹聖元年仲冬望日權即世所謂鍾離先生子髙即天覺丹元子即東坡先生與之醻倡者後有魏㤗道輔跋云天覺修黄籙醮法成浮玉山人謂之曰上天録公之功為須彌山八瓊洞主宜刻印謝帝而佩之天覺不以為信故浮玉又出鍾離公書為證後丹元子又為天覺求書卷末又有徐注者跋云天覺舟過真州方出謁有布衣幅巾者徑入舟中索筆大書閒人吕洞賓來謁張天覺十字擲筆即去而天覺適歸墨猶未乾注真州人云親見之墳前碑樓壁間有詩一篇云秋風十驛望台星想見氷壺照坐清霖雨已回公旦駕挽須聊聽野王箏三朝元老心方壯四海蒼生耳已傾白髪故人來一别却歸林下看昇平葢魏道輔贈天覺詩後人所題者唐立夫舍人亦有一詩末句云無碑堪墮淚著句與招魂宜都知縣右文林郎呂大辨來泊赤崖六日過荆門十二碚皆高崖絶壁嶄巖突兀則峽中之險可知矣過碚望五龍及雞籠山嵳峩正如夏雲之奇峯荆門者當以險固得名碚上有石穴正方髙可通人俗謂之荆門則妄也晚至峽州泊至嘉亭下峽州在唐為硤州後改峽而印文則為陜州元豐中郎官何洵直建言陜與陜相亂請改鑄印文從山事下少府監而監丞歐陽發言湖北之陜州從阜從夾夾從兩人陜西之陜州從阜從夾夾從兩入偏旁不同本不相亂恐四方謂少府監官皆不識字當時朝士之議皆是發而卒從洵直言改鑄云至嘉亭記歐陽公撰黄魯直書七日見知州右朝奉大夫葉安行字履道以小舟游西山甘泉寺竹橋石磴甚有幽趣有靜練洗山二亭下臨江山頗疎豁法堂之右小徑數十步至一泉曰孝婦泉謂姜詩妻龎氏也泉上亦有龎氏祠然歐陽文忠公不以為信故其詩曰叢祠已廢姜祠在事迹難尋楚語訛又此篇首章云江上孤峯蔽緑蘿初讀之但謂孤峯䝉藤蘿耳及至此乃知山下為緑蘿谿也又至漢景帝廟及山東寺景帝不知何以有廟於此歐陽公為令時有祈雨文在集中東山寺亦見歐陽公詩距望京門五里寺外一亭臨小池有山如屏環之頗佳亭前冬青及柏皆百餘年物遂至夷陵縣令見縣左從政郎胡振聽事東至喜堂郡守朱虞部為歐陽公所築者已焚壞柱礎尚存規模頗雄深又東則祠堂亦簡陋肖像殊不𩔖可嘆聽事前一井相傳為歐陽公所浚水極甘寒為一郡之冠井旁一柟合抱亦傳為公手植晚郡集於楚塞樓遍厯爾雅臺錦障亭亭前海棠二本亦百年物爾雅臺者圖經以為郭景純註爾雅於此又有絳雪亭取歐陽公千葉紅梨詩而紅梨已不存矣八日五鼓盡解船過下牢關夾江千峯萬嶂有競起者有獨拔者有崩欲壓者有危欲墜者有横裂者有直坼者有凸者有窪者有鏬者竒怪不可盡狀初冬草木皆青蒼不彫西望重山如闕江出其間則所謂下牢谿也歐陽文忠公有下牢津詩云入峡山漸曲轉灘山更多即此也繫船與諸子及證師登三游洞躡石磴二里其險處不可著脚洞大如三間屋有一穴通人過然陰黒峻嶮尤可畏繚山腹傴僂自巖下至洞前差可行然下臨溪潭石壁十餘丈水聲恐人又一穴後有壁可居鍾乳嵗久垂地若柱正當穴門上有刻云黄大臨弟庭堅同辛紘子大方紹聖二年三月辛亥來游旁石壁上刻云景祐四年七月十日夷陵歐陽永叔下缺一字又云判官丁下又缺數字丁者寳臣也字元珍今丁字下二字亦髣髴可見殊不𩔖元珍字又永叔但曰夷陵不稱令洞外溪上又有一崩石偃仆刻云黄庭堅弟叔向子相姪㯳同道人唐履來游觀辛亥舊題如夢中事也建中靖國元年三月庚寅按魯直初謫黔南以紹聖二年過此嵗在乙􅕀今云辛亥者誤也泊石碑峽石穴中有石如老翁持魚竿狀畧無少異九日㣲雪過扇子峽重山相掩政如屏風扇疑以此得名登蝦蟆碚水品所載第四泉是也蝦蟆在山麓臨江頭鼻吻頷絶𩔖而背􅆃皰處尤逼真造物之巧有如此者自背上深入得一洞穴石色緑潤泉泠泠有聲自洞出垂蝦蟆口鼻間成水簾入江是日極寒巖嶺有積雪而洞口温然如春碚洞相對稍西有一峯孤起侵雲名天柱峯自此山勢稍平然江岸皆大石堆積彌望正如濬渠積土狀晚次黄牛廟山復高峻村人來賣茶菜者甚衆其中有婦人皆以青斑布帕首然頗白晳語音亦頗正茶則皆如柴枝草葉苦不可入口廟靈感神封嘉應保安侯皆紹興以來制書也其下即無義灘亂石塞中流望之可畏然舟過乃不甚覺葢操舟之妙也傳云神佐夏禹治水有功故食於此門左右各一石馬頗卑小以小屋覆之其右馬無左耳葢歐陽公所見也廟後業木似冬青而非莫能名者落葉有黒文𩔖符篆葉葉不同兒輩亦求得數葉歐詩刻石廟中又有張文忠一贊其詞曰壯哉黄牛有大神力輦聚巨石百千萬億劒㦸齒牙磥硊江側壅激波濤險不可測威脅舟人駭怖失色刲羊釃酒千載廟食張公之意似謂神聚石壅流以脅人求祭饗使神之用心果如此豈能巍然廟食千載乎葢過論也夜舟人來告請無擊更鼓云廟後山中多虎聞鼓則出十日早以特豕壺酒祭靈感廟遂行過鹿角虎頭史君諸灘水縮已三之二然湍險猶可畏泊城下歸州秭歸縣界也與兒曹步沙上回望正見黄牛峽廟後山如屏風疊嵳峩揷天第四疊上有若牛狀其色赤黄前有一人如著帽立者昨日及今早雲冒山頂至是始見之因至白沙市慈濟院見主僧志堅問地名城下之由云院後有楚故城今尚在因相與訪之城在一岡阜上甚小南北有門前臨江水對黄牛峽城西北一山蜿蜒回抱山上有伍子胥廟大抵自荆以西子胥廟至多城下多巧石如靈壁湖口之𩔖十一日過達洞灘灘惡與骨肉皆乘轎陸行過灘灘際多奇石五色粲然可愛亦或有文成物象及符書者猶見黄牛峽廟後山太白詩云三朝上黄牛三暮行太遲三朝又三暮不覺鬢成絲歐陽公云朝朝暮暮見黄牛徒使行人過此愁山高更遠望猶見不是黄牛滯客舟葢諺謂朝見黄牛暮見黄牛一朝一暮黄牛如故故二公皆及之歐陽公自荆渚赴夷陵而有下牢三㳺及蝦蟇碚黄牛廟詩者葢在官時來游也故憶夷陵山詩云憶嘗祗吏役鉅細悉經覯其後又云荒烟下牢戍百仭塞溪潄蝦蟇噴水簾甘液勝飲酎亦甞到黄牛泊舟聽猨狖也晚泊馬肝峽口兩山對立修聳摩天畧如廬山江岸多石百丈縈絆極難過夜小雨十二日早過東􅍽灘入馬肝峽石壁高絶處有石下垂如肝故以名峽其傍又有獅子巖巖中有一小石罇踞張頤碧草被之正如一青獅子㣲泉泠泠自巖中出舟行急不能取嘗當亦佳泉也溪上又有一峯孤起秀麗略如小孤山晚抵新灘登岸宿新安驛夜雪十三日舟上新灘由南岸上及十七八船底為石所損急遣人往拯之僅不至沈然鋭石穿船底牢不可動葢舟人載陶器多所致新灘兩岸南曰官漕平聲北曰龍門龍門水尤湍急多暗石官漕差可行然亦多鋭石故為峽中最嶮處非輕舟無一物不可上下舟人冐利以至此可為戒云游江瀆北廟廟正臨龍門其下石罅中有温泉淺而不涸一村賴之婦人汲水皆背負一全木盎長二尺下有三足至泉旁以杓挹水及八分即倒坐旁石束盎背上而去大抵峽中負物率著背又多婦人不獨水也有婦人負酒賣亦如負水狀呼買之長跪以獻未嫁者率為同心髻高二尺插銀釵至六隻後插大象牙梳如手大十四日留驛中晚以小舟渡江南登山至江瀆南廟新修未畢有一碑前進士曾華旦撰言因山崩石壅成此灘害舟不可計於是著令自十月至二月禁行舟知歸州尚書都官員外郎趙誠聞於朝疏鑿之用工八十日而灘害始去皇祐三年也葢江絶於天聖中至是而復通然灘害至今未能悉去若乗十二月正月水落石盡出時亦可併力盡鑱去鋭石然灘上居民皆利於敗舟賤賣板木及滯留買賣必揺沮此役不則賂石工以為石不可去須斷以必行乃可成又舟之所以敗皆失於重載當以大字刻石置驛前則過者必自懲創二者皆不可不講當以告當路者十五日舟人盡出所載始能挽舟過灘然須修治遂易舟離新灘過白狗峽泊舟興山口肩輿游玉虛洞去江岸五里許隔一溪所謂香溪也源出昭君村水未美録於水品色碧如黛呼小舟以渡過溪又里餘洞門小纔袤丈既入則極大可容數百人宏敞壯麗如入大宫殿中有石成幢葢幡旗芝草竹笋仙人龍虎鳥獸之屬千狀萬態莫不逼真其絶異者東石正圓如日西石半䂓如月予平生所見巖竇無能及者有熙寜中謝師厚岑巖起題名又有陳堯咨所作記叙此洞本末云唐天寳中獵者始得之比歸已夜風急不可秉燭炬然月明如晝兒曹與全師皆杖䇿相從殊不覺崖谷之險也十六日到歸州見知州右奉議郎賈選子公通判左朝奉郎陳端彥民瞻館於報恩光孝寺距城一里許蕭然無僧歸之為州纔三四百家負卧牛山臨江州前即入鮓罋城中無尺寸平土灘聲常如暴風雨至隔江有楚王城亦山谷間然地比歸州差平或云楚始封於此山海經及啓封孟除於丹陽城郭璞注云在秭歸縣南疑即此也然史記成王封熊繹於丹陽裴駰乃云在枝江未詳孰是十七日郡集於望洋堂玩芳亭亦皆沙石犖确之地賈守云州倉嵗收秋夏二料麥粟秔米共五千餘石僅比吳中一下户耳十八日初得艬船羌小然底濶而輕於上灘為便十九日郡集於歸鄉堂欲以是晚行不果訪宋玉宅在秭歸縣之東今為酒家舊有石刻宋玉宅三字近以為人避太守家諱去之或遂由此失傳可惜也二十日早離歸州出巫峰門過天慶觀少留觀唐天寳元年碑載明皇夢老子事巴東太守劉瑫所立字畫頗清逸碑側題當時郡官吏胥姓名字亦佳又有周顯德中荆南判官孫光憲為知歸州高從讓所立碑從讓葢南平王家子弟光憲亦知名國史有事迹葢五代時歸峽皆𨽻荆渚也殿前有柏數百年物觀下即吒灘亂石無數飯於靈泉寺遂登舟過業灘亦名灘也水落舟輕俄頃遂過二十一日舟中望石門關僅通一人行天下至險也晚泊巴東縣江山雄麗大勝秭歸但井邑極於蕭條邑中纔百餘戸自令廨而下皆茅茨了無片瓦權縣事秭歸尉右迪功郎王康年尉兼主簿右迪功郎杜德先來皆蜀人也謁寇萊公祠堂登秋風亭下臨江山是日重隂㣲雪天氣飂飃復觀亭名使人悵然始有流落天涯之歎遂登雙柏堂白雲亭堂下舊有萊公所植柏今已槁死然南山重複秀麗可愛白雲亭則天下幽奇絶境羣山環擁層出間見古木森然往往二三百年物欄外雙瀑瀉石澗中跳珠濺玉冷入人骨其下是為慈溪奔流與江會予自吳入楚行五千餘里過十五州亭榭之勝無如白雲者而止在縣廨聽事之後巴東了無一事為令者可以寢飯於亭中其樂無涯而闕令動輒二三年無肯補者何哉二十二日發巴東山益奇怪有夫子洞者一竇在峭壁絶髙處人迹所不可至然髣髴若有欄楯不知所謂夫子者何也過三分泉自山竇中出止兩派俗云三派有年兩派中熟一派或絶流饑饉泊疲石夜雨二十三日過巫山凝真觀謁妙用真人祠真人即世所謂巫山神女也祠正對巫山峯巒上入霄漢山脚直揷江中議者謂太華衡廬皆無此奇然十二峯者不可悉見所見八九峯惟神女峯最為纎麗奇峭宜為仙真所託祝史云每八月十五夜月明時有絲竹之音往來峯頂山猿皆鳴達旦方漸止廟後山半有石壇平曠傳云夏禹見神女授符書於此壇上觀十二峯宛如屛障是日天宇晴齊四顧無纎翳惟神女峯上有白雲數片如鸞鶴翔舞裴徊久之不散亦可異也祠舊有鳥數百送迎客舟自唐夔州刺史李貽詩已云羣鳥幸胙餘矣近乾道元年忽不至今絶無一鳥不知其故泊清水洞洞極深後門自山後出但黮闇水流其中鮮能入者嵗旱祈雨頗應權知巫山縣左文林郎冉徽之尉右迪郎文庶㡬來二十四日早抵巫山縣在峽中亦壯縣也市井勝歸峽二郡隔山南陵山極髙大有路如綫盤屈至絶頂謂之一百八盤葢施州正路黄魯直詩云一百八盤攜手上至今歸夢繞羊腸即謂此也縣廨有故鐵盆底銳似半甕狀極堅厚銘在其中葢漢永平中物也缺處鐵色光黑如佳漆字畫淳質可愛玩有石刻魯直作盆記大畧言建中靖國元年予弟叔向嗣直是涪陵尉攝縣事予起戎州來寓縣廨此盆舊以種蓮余洗滌乃見字云游楚故離宫俗謂之細腰宫有一池亦當時宫中燕游之地今堙没畧盡矣三面皆荒山南望江山奇麗又有將軍墓東晉人也一碑在墓後趺陷入地碑傾前欲壓字纔半存二十五日晡後至大溪口泊舟出美梨大如升二十六日發大溪口入瞿唐峽兩壁對聳上入霄漢其平如削成仰視天如疋練然水已落峽中平如油盎過聖姥泉葢石上一罅人大呼於旁則泉出屢呼則屡出可怪也晚至瞿唐關唐故夔州與白帝城相連杜詩云白帝夔州各異城葢言難辨也關西門正對灔澦堆堆碎石積成出水數十丈土人云方夏秋水漲時水又髙於堆數十丈肩輿入關謁白帝廟氣象甚古松柏皆數百年物有數碑皆孟蜀時所立庭中石筍有黄魯直建中靖國元年題字又有越公堂隋楊素所創少陵為賦詩者已毁今堂近嵗所築亦甚宏壯自關而東即東屯少陵故居也二十七日早至夔州州在山麓沙上所謂魚復永安宫也宫今為州倉而州治在宫西北甘夫人墓西南景德中轉運使丁謂薛顔所徙比白帝頗平曠然失關險無復形勢在瀼之西故一曰瀼西土人謂山間之流通江者曰瀼云州東南有八陣磧孔明之遺迹碎石行列如引繩每嵗江漲磧上水數十丈比退陣石如故入蜀記卷四
